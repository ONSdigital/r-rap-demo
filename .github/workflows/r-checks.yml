name: R Quality Checks

on:
  push:
    paths:
      - '**.R'
  pull_request:
    paths:
      - '**.R'

jobs:
  lint-and-style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install lintr and styler
        run: |
          Rscript -e "install.packages(c('lintr', 'styler'), repos='https://cran.r-project.org')"

      - name: Run lintr
        run: |
          Rscript -e "print(lintr::lint_dir('R'))"
          Rscript -e "print(lintr::lint('main.R'))"

      - name: Run styler (format check)
        run: |
          Rscript -e "if (!styler::style_dir('R', dry = 'on')) quit(status = 1)"
          Rscript -e "if (!styler::style_file('main.R', dry = 'on')) quit(status = 1)"
