name: R Quality Checks

on:
  push:
    paths:
      - '**.R'
  pull_request:
    paths:
      - '**.R'

jobs:
  lint-and-style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Cache R packages
        uses: actions/cache@v3
        with:
          path: ~/.local/share/R
          key: ${{ runner.os }}-r-${{ hashFiles('**/*.lock') }}
          restore-keys: |
            ${{ runner.os }}-r-

      - name: Install lintr
        run: |
          Rscript -e "install.packages('lintr', repos='https://cran.r-project.org')"

      - name: Annotate lintr warnings
        run: |
          Rscript -e "
            lints <- c(lintr::lint_dir('R'), lintr::lint('main.R'))
            lints <- Filter(function(x) inherits(x, 'lint'), lints)
            cat('Lintr found', length(lints), 'warnings.\\n')
            if (length(lints) > 0) {
              for (lint in lints) {
                if (!is.null(lint) && inherits(lint, 'lint')) {
                  cat(sprintf('::warning file=%s,line=%d,col=%d::%s\\n', lint$filename, lint$line_number, lint$column_number, lint$message))
                }
              }
            } else {
              cat('No lintr warnings found.\\n')
            }
          "
