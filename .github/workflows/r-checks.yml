name: R Quality Checks

on:
  pull_request:
    paths:
      - '**.R'

jobs:
  lint-and-style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Set R_LIBS_USER
        run: echo "R_LIBS_USER=$(Rscript -e 'cat(.libPaths()[1])')" >> $GITHUB_ENV

      - name: Cache R packages
        uses: actions/cache@v3
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ hashFiles('**/*.lock') }}
          restore-keys: |
            ${{ runner.os }}-r-

      - name: Install packages
        run: |
          Rscript -e "install.packages('lintr', repos='https://cran.r-project.org')"
          Rscript -e "install.packages('styler', repos='https://cran.r-project.org')"


      - name: Annotate lintr warnings
        run: Rscript run_linters.R

      - name: Post lintr summary to PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const warnings = fs.readFileSync('lintr_warnings.txt', 'utf8');
            if (warnings.trim().length > 0) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: warnings
              });
            }
