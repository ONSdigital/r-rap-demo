name: R Quality Checks

on:
  push:
    paths:
      - '**.R'
  pull_request:
    paths:
      - '**.R'

jobs:
  lint-and-style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install lintr and styler
        run: |
          Rscript -e "install.packages(c('lintr', 'styler'), repos='https://cran.r-project.org')"

      - name: Run lintr
        run: |
          Rscript -e "print(lintr::lint_dir('R'))"
          Rscript -e "print(lintr::lint('main.R'))"

      - name: Run styler (format check)
        run: |
          Rscript -e "result <- styler::style_dir('R', dry = 'on'); if (any(result$changed)) { cat('::warning::Some R files need styling!\\n'); cat('The following files need formatting:\\n'); cat(result$file[result$changed], sep = '\\n'); cat('\\nPlease run styler locally before committing.\\n'); quit(status = 1) } else { cat('All R files are properly styled.\\n') }"
