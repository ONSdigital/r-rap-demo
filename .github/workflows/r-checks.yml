name: R Quality Checks

on:
  pull_request:
    paths:
      - '**.R'

jobs:
  lint-and-style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Set R_LIBS_USER
        run: echo "R_LIBS_USER=$(Rscript -e 'cat(.libPaths()[1])')" >> $GITHUB_ENV

      - name: Cache R packages
        uses: actions/cache@v3
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ hashFiles('**/*.lock') }}
          restore-keys: |
            ${{ runner.os }}-r-

      - name: Install lintr
        run: |
          Rscript -e "install.packages('lintr', repos='https://cran.r-project.org')"

      - name: Annotate lintr warnings
        run: |
          Rscript -e "
            lints <- c(lintr::lint_dir('R'), lintr::lint('main.R'))
            cat('DEBUG: lints length =', length(lints), '\\n')
            lints <- Filter(function(x) inherits(x, 'lint'), lints)
            cat('Lintr found', length(lints), 'warnings.\\n')
            if (length(lints) > 0) {
              for (lint in lints) {
                if (!is.null(lint) && inherits(lint, 'lint')) {
                  cat('DEBUG: lint is a lint object\\n')
                  cat('DEBUG: lint$filename =', paste(lint$filename, collapse = " "), '; typeof:', typeof(lint$filename), '\n')
                  cat('DEBUG: basename(lint$filename) =', paste(basename(lint$filename), collapse = " "), '; typeof:', typeof(basename(lint$filename)), '\n')
                  cat('DEBUG: lint$line_number =', paste(lint$line_number, collapse = " "), '; typeof:', typeof(lint$line_number), '\n')
                  cat('DEBUG: lint$column_number =', paste(lint$column_number, collapse = " "), '; typeof:', typeof(lint$column_number), '\n')
                  cat('DEBUG: lint$message =', paste(lint$message, collapse = " "), '; typeof:', typeof(lint$message), '\n')
                  tryCatch({
                    writeLines(sprintf('::warning file=%s,line=%d,col=%d::%s',
                      as.character(basename(lint$filename)),
                      as.integer(lint$line_number),
                      as.integer(lint$column_number),
                      as.character(lint$message)
                    ))
                    flush.console()
                  }, error = function(e) {
                    cat('DEBUG: sprintf error:', conditionMessage(e), '\\n')
                    str(lint)
                  })
                } else {
                  cat('DEBUG: Skipping non-lint object\\n')
                  str(lint)
                }
              }
            } else {
              cat('No lintr warnings found.\\n')
            }
            flush.console()
          "
