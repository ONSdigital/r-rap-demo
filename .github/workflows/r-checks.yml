name: R Quality Checks

on:
  push:
    paths:
      - '**.R'
  pull_request:
    paths:
      - '**.R'

jobs:
  lint-and-style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Cache R packages
        uses: actions/cache@v3
        with:
          path: ~/.local/share/R
          key: ${{ runner.os }}-r-${{ hashFiles('**/*.lock') }}
          restore-keys: |
            ${{ runner.os }}-r-

      - name: Install lintr
        run: |
          Rscript -e "install.packages('lintr', repos='https://cran.r-project.org')"

      - name: Annotate lintr warnings
        run: |
          Rscript -e "
            lints <- c(lintr::lint_dir('R'), lintr::lint('main.R'))
            cat('DEBUG: lints length =', length(lints), '\\n')
            for (i in seq_along(lints)) {
              cat('DEBUG: lints[[', i, ']] class:', class(lints[[i]]), '\\n')
              if (!is.null(lints[[i]])) {
                str(lints[[i]])
              }
            }
            lints <- Filter(function(x) inherits(x, 'lint'), lints)
            cat('Lintr found', length(lints), 'warnings.\\n')
            if (length(lints) > 0) {
              for (lint in lints) {
                if (!is.null(lint) && inherits(lint, 'lint')) {
                  cat("DEBUG: lint object follows:\n")
                  str(lint)
                  cat('DEBUG: lint is a lint object\\n')
                  cat('DEBUG: lint$filename =', lint$filename, '\\n')
                  cat('DEBUG: lint$line_number =', lint$line_number, '\\n')
                  cat('DEBUG: lint$column_number =', lint$column_number, '\\n')
                  cat('DEBUG: lint$message =', lint$message, '\\n')
                  tryCatch({
                    cat(sprintf('::warning file=%s,line=%d,col=%d::%s\\n',
                                lint$filename, lint$line_number, lint$column_number, lint$message))
                  }, error = function(e) {
                    cat('DEBUG: sprintf error:', conditionMessage(e), '\\n')
                    str(lint)
                  })
                } else {
                  cat('DEBUG: Skipping non-lint object\\n')
                  str(lint)
                }
              }
            } else {
              cat('No lintr warnings found.\\n')
            }
          "
